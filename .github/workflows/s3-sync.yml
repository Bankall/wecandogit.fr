name: Sync to S3

on:
    push:
        branches:
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm install

            - name: Export environment variables
              run: echo "VITE_API_ENDPOINT=https://wecandogit.com/api/v1" >> $GITHUB_ENV

            - name: Build project
              run: npm run build

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: eu-west-1 # Change to your region

            - name: Sync files to S3
              run: aws s3 sync dist/ s3://wecandogit.com --delete --exclude "uploads/*"

            - name: Invalidate CloudFront distribution
              run: aws cloudfront create-invalidation --distribution-id E312XJ65T65NWC --paths "/*"
